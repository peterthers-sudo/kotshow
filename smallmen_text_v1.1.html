// ── STATISK FLOW ──────────────────────────────────────────────
// 11 ansøgere · K1 (grp.10), K2 (grp.20), K1-standby (grp.60), K2-standby (grp.70)
// Logisk korrekt: kun ansøgere på prio 2 i Jura "flyver" til prio 1 andetsteds.
function generateStaticSlides() {
  const u = UDBUD[FOKUS_IDX], uid = u.id;
  const GRPS = [10, 20, 60, 70];
  const S = (n,t) => ({id:n, status:t}), T = n => ({tom:n});
  const OPT = n => S(n,'optaget'), UÆ = n => S(n,'uændret'), MID = n => S(n,'midlertidig');
  const KØ = (n, up) => ({ id:n, status:'kø', uplaceret: !!up });
  const GHOST = n => S(n,'ghost');

  // "Tilbud på alle ønsker": for hver gruppe rangeres ALLE der har søgt den; de
  // første kap får et midlertidigt tilbud, resten står i kø. En ansøger optræder
  // derfor i alle de grupper, vedkommende har søgt (oprydningen sker i clearingen).
  function buildProposal(gone) {
    const placed = {}, queued = {}, allPlaced = new Set();
    for (const g of GRPS) {
      const f = rankField(g);
      const ids = KAND.filter(a => a.j.includes(g) && !(gone && gone.has(a.id)))
        .map(a => a.id)
        .sort((x,y) => (ansInfo(y)?.[f] ?? 0) - (ansInfo(x)?.[f] ?? 0)
                    || (ansInfo(x)?._rang ?? 0) - (ansInfo(y)?._rang ?? 0));
      placed[g] = ids.slice(0, CAP0[g]);
      queued[g] = ids.slice(CAP0[g]);
      placed[g].forEach(id => allPlaced.add(id));
    }
    return { placed, queued, allPlaced };
  }
  const END = n => ({id:n, status:'optaget', endelig:true});

  // ── Motor-input afledt af ANSØGERE ──────────────────────────────
  const juraGrps = a => { const an = a.ansøgninger.find(x=>x.udbud===uid); return an ? [...an.grupper].sort((x,y)=>x-y) : []; };
  const flyTil   = a => { const b = a.ansøgninger.filter(x=>x.udbud!==uid).sort((p,q)=>p.prio-q.prio)[0]; return b ? (udbudInfo(b.udbud)?.navn || null) : null; };
  const KAND  = ANSØGERE.map(a=>({id:a.id, j:juraGrps(a), til:flyTil(a)})).filter(a=>a.j.length);
  const kById = Object.fromEntries(KAND.map(a=>[a.id,a]));
  const rng = (id,g) => ansInfo(id)?.[rankField(g)] ?? 0;   // rang i gruppen (snit/kval)
  const lr  = id => ansInfo(id)?._rang ?? 0;                // lodtrækning (kun ved lige)

  // ── Deferred acceptance over Jura's grupper (migration mod laveste nr.) ──
  function fordel(caps, gone) {
    const prefs = {}, ptr = {}, holders = {10:[],20:[],60:[],70:[]};
    for (const a of KAND) { if (gone.has(a.id)) continue; prefs[a.id] = a.j; ptr[a.id] = 0; }
    let unplaced = Object.keys(prefs);
    while (unplaced.length) {
      for (const id of unplaced) { const p = prefs[id]; if (ptr[id] < p.length) holders[p[ptr[id]]].push(id); }
      let bumped = false;
      for (const g of GRPS) {
        holders[g].sort((x,y)=> rng(y,g)-rng(x,g) || lr(x)-lr(y));
        if (holders[g].length > caps[g]) { const ex = holders[g].splice(caps[g]); for (const id of ex) { ptr[id]++; bumped = true; } }
      }
      const inHold = new Set(Object.values(holders).flat());
      unplaced = Object.keys(prefs).filter(id => ptr[id] < prefs[id].length && !inHold.has(id));
      if (!bumped) break;
    }
    const place = {}; for (const g of GRPS) for (const id of holders[g]) place[id] = g;
    const queues = {10:[],20:[],60:[],70:[]};
    for (const a of KAND) { if (gone.has(a.id)) continue; const cur = place[a.id];
      for (const g of a.j) { const better = cur!==undefined && cur<=g; if (!better && holders[g].length >= caps[g]) queues[g].push(a.id); } }
    for (const g of GRPS) queues[g].sort((x,y)=> rng(y,g)-rng(x,g) || lr(x)-lr(y));
    return { place, queues, holders };
  }
  // Pladsflyt: kun i pool, kun når én gruppe har ledige pladser OG makkeren har kø → alle ledige flyttes.
  function findRealloc(caps, st) {
    for (const [a,b] of [[10,20],[60,70]]) {
      const fa = caps[a]-st.holders[a].length, fb = caps[b]-st.holders[b].length;
      if (fa>0 && st.queues[b].length>0 && fb<=0) return {from:a, to:b, n:fa};
      if (fb>0 && st.queues[a].length>0 && fa<=0) return {from:b, to:a, n:fb};
    }
    return null;
  }

  // ── Scenarie-knapper (justeres her) ─────────────────────────────
  const CAP0 = {10:5, 20:5, 60:2, 70:2};
  const FLY_ORDER = ['B', ['E','L'], ['I','X'], 'P', 'W', 'Z'];   // rækkefølge for afgange til andre udbud

  // ── Kør runderne ────────────────────────────────────────────────
  const caps = {...CAP0}, gone = new Set(), rounds = [];
  let prev = null, st = fordel(caps, gone), r = 1, fi = 0;
  rounds.push({ n:1, caps:{...caps}, st, prev:null });
  while (true) {
    let ev = null; const rc = findRealloc(caps, st);
    if (rc) ev = {type:'realloc', ...rc};
    else if (fi < FLY_ORDER.length) {
      let grp = FLY_ORDER[fi]; grp = Array.isArray(grp) ? grp : [grp];
      grp = grp.filter(id => !gone.has(id) && st.place[id] !== undefined); fi++;
      if (grp.length) ev = {type:'fly', ids:grp}; else continue;
    }
    rounds[rounds.length-1].evUd = ev;
    if (!ev) break;
    if (ev.type==='fly') ev.ids.forEach(id=>gone.add(id)); else { caps[ev.from]-=ev.n; caps[ev.to]+=ev.n; }
    prev = st; st = fordel(caps, gone); r++; rounds.push({ n:r, caps:{...caps}, st, prev });
    if (r > 20) break;
  }
  const finalState = st, finalCaps = {...caps};
  // Lodtrækning: find ansøgere der er lige ved en K1-grænsekvotient (grp 10/60),
  // hvor der er flere med den karakter end der blev optaget på den (= lodtrækning).
  LOTTERY_IDS = new Set();
  [10,60].forEach(g => {
    const holders = finalState.holders[g] || [];
    if (!holders.length) return;
    const gk = Math.min(...holders.map(id => ansInfo(id).gns));
    const alleVedGk = ANSØGERE.filter(a => a.gns === gk &&
      a.ansøgninger.some(an => an.udbud === uid && an.grupper.includes(g)));
    const optVedGk = holders.filter(id => ansInfo(id).gns === gk);
    if (alleVedGk.length > optVedGk.length) alleVedGk.forEach(a => LOTTERY_IDS.add(a.id));
  });
  let cum = []; rounds.forEach(rd => { rd.goneBefore = [...cum]; if (rd.evUd?.type==='fly') cum = [...cum, ...rd.evUd.ids]; });
  const fløjetAlle = [...gone];

  // ── Adapter-hjælpere ────────────────────────────────────────────
  function midEntries(stt, prv, cps, g, goneSet) {
    // UÆ: dem der sad i g ved sidste rundes slut — bliver vist her indtil clearing
    //     (også dem der er på vej op; de forlader g først på clearing-siden).
    const uæIds = prv ? KAND.filter(a => !goneSet.has(a.id) && prv.place[a.id]===g).map(a=>a.id) : [];
    const uæSet = new Set(uæIds);
    // MID: udfordrere der søger g og rykker op i g denne runde (er placeret i g i stt).
    const midIds = KAND.filter(a => !goneSet.has(a.id) && a.j.includes(g) && !uæSet.has(a.id) &&
        stt.place[a.id]===g && (prv ? (prv.place[a.id]===undefined || prv.place[a.id] > g) : true)).map(a=>a.id);
    const seats = [...uæIds.map(id=>UÆ(id)), ...midIds.map(id=>MID(id))];
    const free = cps[g] - seats.length;
    const ents = [...seats];
    if (free > 0) ents.push(T(free));
    // Kø som farveløse skygger: alle der venter på g (også standby-folk der
    // venter på en bedre plads). De er farvede på deres egen plads, skygge her.
    const seatSet = new Set([...uæIds, ...midIds]);
    const kø = (stt.queues[g]||[]).filter(id => !goneSet.has(id) && !seatSet.has(id));
    ents.push(...kø.map(id=>KØ(id, stt.place[id]===undefined)));
    return ents;
  }
  function optEntries(stt, cps, g) {
    const ents = stt.holders[g].map(id => OPT(id));
    const free = cps[g]-stt.holders[g].length; if (free>0) ents.push(T(free));
    const hold = new Set(stt.holders[g]);
    // Kø som farveløse skygger: alle der venter på g (også dem med en dårligere plads).
    const kø = (stt.queues[g]||[]).filter(id => !hold.has(id));
    ents.push(...kø.map(id=>KØ(id, stt.place[id]===undefined)));
    return ents;
  }
  const slotsFra = fn => ({10:fn(10), 20:fn(20), 60:fn(60), 70:fn(70)});

  const slides = [];
  // Kapacitet — de tomme pladser præsenteres
  slides.push({ titel:`Kapacitet — ${u.navn}`, slideType:'tom',
    note:'Alle pladser er ledige. Ansøgerne fordeles via Kvote 1 (snit), Kvote 2 (kvalifikation) og to standby-grupper.',
    legende:['tom'], visOverblik:true,
    udbud:[{ udbudId:uid, kap:{...CAP0}, slots:slotsFra(g => CAP0[g]>0 ? [T(CAP0[g])] : []) }] });

  // Ansøgere — samme "tilbud på alle ønsker"-placering som Runde 1 midlertidig,
  // men alt som grå ghosts. Ingen ændring i pladserne fra Ansøgere → Midlertidig.
  const proposal = buildProposal(new Set());
  slides.push({ titel:`Ansøgere — ${u.navn}`, slideType:'ansøgere', visTerning:true,
    note:'Her er alle ansøgerne. I den midlertidige placering får hver ansøger tilbud på alle sine ønsker (de bedst rangerede i hver gruppe), så man står flere steder. Oprydningen til én plads sker i clearingen.',
    legende:['ghost'],
    udbud:[{ udbudId:uid, kap:{...CAP0}, slots:slotsFra(g => {
      const ents = proposal.placed[g].map(id => GHOST(id));
      const free = CAP0[g] - proposal.placed[g].length;
      if (free > 0) ents.push(T(free));
      ents.push(...proposal.queued[g].map(id => GHOST(id)));
      return ents;
    }) }] });

  let r1DeferIds = new Set();   // ansøgere hvis standby-placering er udskudt fra runde 1 til runde 2
  rounds.forEach((rd,i) => {
    const goneSet = new Set(rd.goneBefore);
    const next = rounds[i+1];
    const isLastRound = i === rounds.length - 1;
    const keepSeparatePladsflyt = isLastRound || rd.n === 6;
    // Midlertidig
    let midSlots = (i === 0)
      // Runde 1: alle får tilbud på alle deres ønsker (samme layout som Ansøgere-siden)
      ? slotsFra(g => {
          const ents = proposal.placed[g].map(id => MID(id));
          const free = CAP0[g] - proposal.placed[g].length;
          if (free > 0) ents.push(T(free));
          ents.push(...proposal.queued[g].map(id => KØ(id, !proposal.allPlaced.has(id))));
          return ents;
        })
      : slotsFra(g => midEntries(rd.st, rd.prev, rd.caps, g, goneSet));
    // Runde 2: standby-pladserne, som blev udskudt fra runde 1, fyldes nu. De fire
    // fyld-ansøgere (Emma, Finn, Xenia, Pernille) markeres som midlertidige (timeglas).
    // Emma rykker dog op til Kvote 1, så hendes standby-entry krydses (svæver) — men
    // får også timeglas, fordi hun er ny i denne runde.
    if (rd.n === 2) {
      for (const g of [60, 70]) {
        for (const e of (midSlots[g] || [])) {
          if (e && !e.tom && e.status === 'uændret' && r1DeferIds.has(e.id)) {
            e.status = 'midlertidig';
            if (rd.st.place[e.id] !== undefined && rd.st.place[e.id] < +g) e.kryds = true;
          }
        }
      }
    }
    slides.push({ titel:`Runde ${rd.n} · Forberedelse til clearing — ${u.navn}`, slideType:'midlertidig',
      note: (i === 0 ? 'Hver ansøger får et midlertidigt tilbud på alle sine ønsker — de bedst rangerede i hver gruppe. Derfor står man flere steder. I clearingen ryddes der op, så hver ansøger kun beholder sit højeste opfyldte ønske.' : midNote(rd,i)),
      legende:['uændret','midlertidig'], runde:rd.n, fløjet:rd.goneBefore,
      udbud:[{ udbudId:uid, kap:{...rd.caps}, slots: midSlots }] });
    // Clearing (+ migrationer = rykOp)
    const mig = [];
    if (rd.prev) for (const id in rd.st.place) { const pg = rd.prev.place[id]; if (pg!==undefined && rd.st.place[id] < pg) mig.push({id, fra:pg, til:rd.st.place[id]}); }
    // Nyoptagne: enten fra køen (ingen plads før → "Nyoptaget") eller rykket op
    // fra en dårligere gruppe (havde plads før → "Rykket op").
    const nyopt = [];
    if (rd.prev) for (const id in rd.st.place) {
      const pg = rd.prev.place[id];
      if (pg === undefined)            nyopt.push({ id, op:false });
      else if (rd.st.place[id] < pg)   nyopt.push({ id, op:true  });
    }
    // Runde 2: de standby-fyld der blev udskudt fra runde 1 (Finn, Xenia, Pernille)
    // optages reelt først nu — de skal også blinke som "Nyoptaget" (fra kø).
    if (rd.n === 2) {
      const have = new Set(nyopt.map(n => n.id));
      for (const id of r1DeferIds) if (!have.has(id)) nyopt.push({ id, op:false });
    }
    const køMap = {}; for (const g of GRPS) køMap[g] = rd.st.queues[g].length;

    if (keepSeparatePladsflyt) {
      // Runde 6 + sidste runde: separat clearing og pladsflyt-side.
      // Runde 6's clearing er overflødig (intet optages/rykker op her — kun en pladsflyt),
      // så den springes over. Den sidste rundes clearing beholdes.
      if (!(rd.n === 6 && !isLastRound)) {
        const clrSlots = slotsFra(g => optEntries(rd.st, rd.caps, g));
        // Kø-skygger der skal flyve væk: en netop optaget (nyoptagen) ansøgers
        // efterladte kø-plads i en ANDEN gruppe end den, vedkommende er optaget i
        // (fx Yrsa optages i Kvote 2 og forlader sin Kvote 1-kø-skygge).
        const placedGrp = {};
        for (const g in clrSlots) for (const e of clrSlots[g]) if (e && e.status === 'optaget') placedGrp[e.id] = +g;
        const nyoptIds = new Set(nyopt.map(n => n.id));
        const køFly = [];
        for (const g in clrSlots) for (const e of clrSlots[g]) {
          if (e && e.status === 'kø' && nyoptIds.has(e.id) && placedGrp[e.id] !== undefined && +g !== placedGrp[e.id])
            køFly.push({ id: e.id, grp: +g });
        }
        slides.push({ titel:`Runde ${rd.n} · Clearing — ${u.navn}`, slideType:'clearing',
          note: clrNote(rd, mig), legende:['optaget','tom'], fløjet:rd.goneBefore,
          ...(mig.length?{rykOp:mig}:{}), ...(nyopt.length?{nyoptaget:nyopt}:{}),
          ...(køFly.length?{køFlyverVæk:køFly}:{}),
          udbud:[{ udbudId:uid, kap:{...rd.caps}, køMap, slots: clrSlots }] });
      }
      const pfUd = { udbudId:uid }; let pfNote = ''; const extra = { fløjet:rd.goneBefore };
      if (rd.evUd?.type==='realloc') {
        const e = rd.evUd; pfUd.kap = {...next.caps};
        pfUd.badges = { [e.from]:`-${e.n} plads`, [e.to]:`+${e.n} plads` };
        pfUd.slots = slotsFra(g => optEntries(rd.st, next.caps, g));
        pfNote = `${grpNavn(e.from)} har ${e.n} ledig${e.n>1?'e':''} plads${e.n>1?'er':''} og ingen i kø — ${e.n>1?'de':'den'} flyttes til ${grpNavn(e.to)}, hvor der er kø. En ny ledig plads opstår, som køen kæmper om i næste runde.`;
      } else if (rd.evUd?.type==='fly') {
        const e = rd.evUd; pfUd.kap = {...rd.caps};
        const byGrp = {}; e.ids.forEach(id => { const g = rd.st.place[id]; byGrp[g] = (byGrp[g]||0)+1; });
        pfUd.badges = {}; for (const g in byGrp) pfUd.badges[g] = `+${byGrp[g]} plads`;
        pfUd.slots = slotsFra(g => optEntries(rd.st, rd.caps, g));
        extra.flyverVæk = e.ids.map(id => ({id, til:kById[id].til}));
        pfNote = flyNote(e);
      } else {
        pfUd.kap = {...rd.caps}; pfUd.slots = slotsFra(g => optEntries(rd.st, rd.caps, g));
        pfNote = 'Ingen ledige pladser at flytte og ingen i kø der kan rykke op — fordelingen er stabil og stopper.';
      }
      slides.push({ titel:`Runde ${rd.n} · Pladsflyt — ${u.navn}`, slideType:'pladsflyt',
        note: pfNote, legende:['optaget','tom'], ...extra, udbud:[pfUd] });
    } else {
      // Øvrige runder: pladsflyt-animationen foldes ind i clearing-siden (ingen separat pladsflyt-side)
      let clrKap, clrSlots, clrBadges, clrFlyverVæk, pladsflytAnimer;
      if (rd.evUd?.type === 'realloc') {
        const e = rd.evUd;
        clrKap = {...next.caps};
        clrSlots = slotsFra(g => optEntries(rd.st, next.caps, g));
        clrBadges = { [e.from]:`-${e.n} plads`, [e.to]:`+${e.n} plads` };
        pladsflytAnimer = 'realloc';
      } else if (rd.evUd?.type === 'fly') {
        const e = rd.evUd;
        clrKap = {...rd.caps};
        clrSlots = slotsFra(g => optEntries(rd.st, rd.caps, g));
        const byGrp = {}; e.ids.forEach(id => { const g = rd.st.place[id]; byGrp[g] = (byGrp[g]||0)+1; });
        clrBadges = {}; for (const g in byGrp) clrBadges[g] = `+${byGrp[g]} plads`;
        clrFlyverVæk = e.ids.map(id => ({id, til:kById[id].til}));
        pladsflytAnimer = 'fly';
      } else {
        clrKap = {...rd.caps};
        clrSlots = slotsFra(g => optEntries(rd.st, rd.caps, g));
        pladsflytAnimer = 'stabil';
      }
      // Runde 1: standby-pladserne fyldes IKKE i clearingen. Dubletterne (Anna/Camilla
      // i K1-standby, Karen/Mette i K2-standby) beholder deres Kvote 1/Kvote 2-plads og
      // vises KRYDSET (de frigiver standby-dubletten) — uden lås og uden timeglas. De
      // frigjorte standby-pladser vises som tomme NY-stole. Selve fyldningen sker først
      // på Runde 2 · Forberedelse; vi gemmer hvem der skal fylde (r1DeferIds).
      if (rd.n === 1) {
        const kept = {};
        for (const g of GRPS) for (const id of proposal.placed[g]) if (kept[id]===undefined || g<kept[id]) kept[id]=g;
        const fyld = [];
        for (const g of GRPS) for (const id of rd.st.holders[g]) if (kept[id] !== g) fyld.push({ id, grp:g });
        const fyldSet = new Set(fyld.map(f=>`${f.id}@${f.grp}`));
        r1DeferIds = new Set(fyld.map(f=>f.id));
        clrSlots = slotsFra(g => {
          const ents = [];
          // Dubletter der frigiver denne standby-plads (de har en bedre gruppe): vist krydset.
          const krydsede = proposal.placed[g].filter(id => kept[id] !== g);
          ents.push(...krydsede.map(id => ({ ...OPT(id), kryds: true })));
          // Faktiske indehavere her efter dedup (for standby er fyldningen udskudt → tom).
          const shown = rd.st.holders[g].filter(id => kept[id] === g && !fyldSet.has(`${id}@${g}`));
          ents.push(...shown.map(id => OPT(id)));
          const free = rd.caps[g] - shown.length;
          if (free > 0) ents.push({ tom: free, ny: true });
          const fills = rd.st.holders[g].filter(id => fyldSet.has(`${id}@${g}`));
          const kø = [...fills, ...(rd.st.queues[g]||[])];
          ents.push(...kø.map(id => KØ(id, fyldSet.has(`${id}@${g}`) ? true : rd.st.place[id]===undefined)));
          return ents;
        });
      }
      slides.push({
        titel: `Runde ${rd.n} · Clearing — ${u.navn}`, slideType: 'clearing',
        note: clrNote(rd, mig), legende: ['optaget','tom'], fløjet: rd.goneBefore,
        ...(mig.length ? {rykOp:mig} : {}), ...(nyopt.length ? {nyoptaget:nyopt} : {}),
        ...(clrFlyverVæk ? {flyverVæk:clrFlyverVæk} : {}),
        pladsflytAnimer,
        udbud: [{ udbudId:uid, kap:clrKap, ...(clrBadges ? {badges:clrBadges} : {}), køMap, slots:clrSlots }]
      });
    }
  });

  // Endelig fordeling: den sidste pladsflyt-side bliver slutsiden (ingen separat resultatside)
  const placedFinal = new Set(Object.keys(finalState.place));
  const afviste = KAND.filter(a => !gone.has(a.id) && !placedFinal.has(a.id)).map(a=>a.id);
  const koePerGrp = {}; for (const g of GRPS) koePerGrp[g] = finalState.queues[g].length;
  const sidste = slides[slides.length - 1];
  sidste.titel = `Endelig fordeling — ${u.navn}`;
  sidste.visStatus = true;
  sidste.visTerning = true;
  sidste.slutLås = true;
  sidste.afviste = afviste;
  sidste.fløjet = fløjetAlle;
  sidste.note = resNote(fløjetAlle, afviste);
  if (sidste.udbud?.[0]) {
    sidste.udbud[0].koePerGrp = koePerGrp;
    // Grænsekvotient for K1: minimum gns blandt de endeligt optagne
    const hs10 = finalState.holders[10] || [];
    if (hs10.length) {
      const gk10 = Math.min(...hs10.map(id => ansInfo(id).gns));
      sidste.udbud[0].gkv = { 10: (gk10 + 0.1).toFixed(1).replace('.', ',') };
    }
  }

  const tot = slides.length; slides.forEach((s,i)=> s.slideNum = `${i+1}/${tot}`);
  return slides;

  // ── Note-tekster (hoistes) ──────────────────────────────────────
  function grpNavn(g){ return ({10:'Kvote 1', 20:'Kvote 2', 60:'K1-standby', 70:'K2-standby'})[g]; }
  function navn(id){ return ansInfo(id)?.navn || id; }
  function midNote(rd,i){
    if (rd.n===1) return `Alle ${KAND.length} ansøgere søger simultant. Hver gruppe placerer midlertidigt de højest rangerede op til sin kapacitet; resten står i kø.`;
    const pe = rounds[i-1]?.evUd;
    if (pe?.type==='realloc') return `Den flyttede kapacitet i ${grpNavn(pe.to)} fyldes nu fra køen. Ansøgere rykker om muligt op mod laveste gruppenummer.`;
    if (pe?.type==='fly')     return `De ledige pladser efter ${pe.ids.map(navn).join(' og ')} fyldes fra køen. Ansøgere rykker om muligt op mod laveste gruppenummer.`;
    return 'Køen kæmper om de ledige pladser.';
  }
  function clrNote(rd,mig){
    let s = 'De midlertidige placeringer bekræftes.';
    if (mig.length) s += ' ' + mig.map(m=>`${navn(m.id)} rykker op fra ${grpNavn(m.fra)} til ${grpNavn(m.til)}`).join('; ') + '.';
    return s;
  }
  function flyNote(e){
    const parts = e.ids.map(id=>`${navn(id)} optages på sin højere prioritet (${kById[id].til}) og forlader ${u.navn}`);
    return parts.join('; ') + `. ${e.ids.length>1?'Pladserne bliver ledige':'Pladsen bliver ledig'} — en ny runde starter.`;
  }
  function resNote(fløj, afv){
    let s = `Fordelingen er stabil. ${fløj.length} ansøgere blev optaget på en højere prioritet på et andet udbud (${fløj.map(navn).join(', ')}).`;
    if (afv.length) s += ` ${afv.map(navn).join(', ')} fik ingen ${u.navn}-plads.`;
    return s;
  }
}

// ── START ─────────────────────────────────────────────────────

// Kun Finn/Gitte/Hans har samme snit (9,9) og afgøres af lodtrækningen.
// Fast rækkefølge: Finn (F) → Hans (H) → Gitte (G), som reproducerer trin-teksterne
// (runde 2: Hans → standby; runde 3: Finn → K1, Gitte → standby).
const LOD_RAEKKEFOELGE = { F: 0, H: 1, G: 2 };
ANSØGERE.forEach((a, i) => a._rang = LOD_RAEKKEFOELGE[a.id] ?? (10 + i));
SLIDES = generateStaticSlides();
renderAll();
scalePPT();
</script>

function toggleTrainPanel(){
  const p = document.getElementById('trainPanel');
  const collapsed = p.classList.toggle('collapsed');
  document.getElementById('trainToggle').textContent = collapsed ? 'Tekst ▴' : 'Tekst ▾';
  scalePPT();
}

function ttFormat(txt){
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return txt.split('\n\n').map(par =>
    '<p>' + esc(par).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>') + '</p>'
  ).join('');
}

function renderTrinTekst(){
  const i   = currentTrin;                 // tekst følger trin (= tælleren), ikke slide
  const tot = TRIN.length;
  const prv = TRINTEKST[i - 1];
  const cur = TRINTEKST[i];
  const nxt = TRINTEKST[i + 1];

  if (prv){
    document.getElementById('ttForrigeTag').textContent  = `Forrige · ${i}/${tot}`;
    document.getElementById('ttForrigeHead').textContent = prv.head;
    document.getElementById('ttForrigeBody').innerHTML   = ttFormat(prv.body);
  } else {
    document.getElementById('ttForrigeTag').textContent  = 'Forrige';
    document.getElementById('ttForrigeHead').textContent = '';
    document.getElementById('ttForrigeBody').innerHTML   = '<p class="tt-empty">Start</p>';
  }

  document.getElementById('ttAktuelTag').textContent  = `Nu · ${i + 1}/${tot}`;
  document.getElementById('ttAktuelHead').textContent = cur ? cur.head : '';
  document.getElementById('ttAktuelBody').innerHTML   = cur ? ttFormat(cur.body) : '';

  if (nxt){
    document.getElementById('ttNaesteTag').textContent  = `Næste · ${i + 2}/${tot}`;
    document.getElementById('ttNaesteHead').textContent = nxt.head;
    document.getElementById('ttNaesteBody').innerHTML   = ttFormat(nxt.body);
  } else {
    document.getElementById('ttNaesteTag').textContent  = 'Næste';
    document.getElementById('ttNaesteHead').textContent = '';
    document.getElementById('ttNaesteBody').innerHTML   = '<p class="tt-empty">Sidste trin</p>';
  }
}
